<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIGZEX Admin | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { brand: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 950: '#1e1b4b' } }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 70%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .glass-input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            transition: all 0.3s;
        }
        .glass-input:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
            background: rgba(15, 23, 42, 1);
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col justify-center min-h-screen">

    <div id="login-screen" class="w-full max-w-md mx-auto transition-all duration-500">
        <div class="text-center mb-8">
            <h1 class="font-heading text-3xl font-extrabold tracking-widest text-white mb-2">ZIGZEX</h1>
            <p class="text-brand-400 text-xs font-bold uppercase tracking-widest">Secure Command Center</p>
        </div>
        
        <div class="glass-panel rounded-2xl p-8">
            <form id="loginForm" class="space-y-6">
                <div id="loginError" class="hidden bg-rose-500/20 border border-rose-500/50 text-rose-400 text-xs font-bold p-3 rounded-lg text-center">
                    Invalid credentials. Please try again.
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Admin Email</label>
                    <input type="email" id="adminEmail" required class="glass-input w-full rounded-lg px-4 py-3" placeholder="info@zigzex.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Password</label>
                    <input type="password" id="adminPassword" required class="glass-input w-full rounded-lg px-4 py-3" placeholder="••••••••">
                </div>
                <button type="submit" id="loginBtn" class="w-full py-3.5 bg-brand-600 text-white font-bold rounded-lg hover:bg-brand-500 transition-colors shadow-lg shadow-brand-500/20">
                    <i class="fa-solid fa-lock mr-2"></i> Authenticate
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden w-full h-full flex-grow flex flex-col transition-opacity duration-500 opacity-0 max-w-[90rem] mx-auto">
        
        <div class="w-full flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 mt-4">
            <div>
                <h1 class="font-heading text-2xl md:text-4xl font-extrabold text-white tracking-tight mb-2">Command Center</h1>
                <div class="flex gap-4 text-xs font-bold uppercase tracking-widest">
                    <span class="text-brand-400"><i class="fa-solid fa-layer-group mr-1"></i> <span id="stat-total">0</span> Total</span>
                    <span class="text-emerald-400"><i class="fa-solid fa-circle-check mr-1"></i> <span id="stat-live">0</span> Live</span>
                    <span class="text-rose-400"><i class="fa-solid fa-eye-slash mr-1"></i> <span id="stat-hidden">0</span> Hidden</span>
                </div>
            </div>
            
            <div class="flex gap-3 w-full md:w-auto overflow-x-auto pb-2 md:pb-0">
                <button onclick="window.exportToCSV()" class="flex-1 md:flex-none px-4 md:px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/30 transition-all flex items-center justify-center gap-2 text-sm">
                    <i class="fa-solid fa-file-csv"></i> Export
                </button>
                <button onclick="openModal()" class="flex-1 md:flex-none px-4 md:px-6 py-3 bg-brand-600 hover:bg-brand-500 text-white font-bold rounded-xl shadow-lg shadow-brand-500/30 transition-all flex items-center justify-center gap-2 text-sm">
                    <i class="fa-solid fa-plus"></i> New
                </button>
                <button onclick="window.logoutAdmin()" class="px-5 py-3 bg-slate-800 hover:bg-rose-500/20 text-slate-300 hover:text-rose-400 border border-slate-700 hover:border-rose-500/50 font-bold rounded-xl transition-all flex items-center justify-center gap-2 text-sm">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </div>

        <div class="glass-panel rounded-2xl p-4 mb-6 flex flex-col lg:flex-row gap-4 items-center z-10 relative">
            <div class="relative w-full lg:w-2/5">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="adminSearch" placeholder="Search by title, industry, or tech..." class="glass-input w-full rounded-lg py-2.5 pl-11 pr-4 text-sm font-medium">
            </div>
            
            <div class="flex flex-col sm:flex-row w-full lg:w-auto gap-4 flex-grow justify-end">
                <select id="adminStatusFilter" class="glass-input w-full sm:w-40 rounded-lg py-2.5 px-4 text-sm font-bold appearance-none cursor-pointer">
                    <option value="All">All Statuses</option>
                    <option value="Live">Live</option>
                    <option value="In Development">In Dev</option>
                    <option value="Maintenance">Maintenance</option>
                </select>
                
                <select id="adminIndustryFilter" class="glass-input w-full sm:w-48 rounded-lg py-2.5 px-4 text-sm font-bold appearance-none cursor-pointer">
                    <option value="All">All Industries</option>
                </select>
            </div>
        </div>

        <div id="admin-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-20 text-slate-400 animate-pulse">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-brand-500"></i>
                <p class="font-bold tracking-widest uppercase text-sm">Syncing Database...</p>
            </div>
        </div>

        <div class="mt-10 text-center mb-10">
            <button id="adminLoadMoreBtn" onclick="window.loadMoreAdminProjects()" class="hidden px-8 py-3 bg-slate-800 border border-slate-700 text-white text-sm font-bold rounded-xl hover:bg-slate-700 transition-all items-center gap-2 mx-auto shadow-lg">
                Load More Projects <i class="fa-solid fa-angle-down ml-1 text-brand-400"></i>
            </button>
        </div>
    </div>

    <div id="projectModal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-slate-900/80 backdrop-blur-sm">
        <div class="flex min-h-full items-start justify-center p-4 pt-10 pb-24 sm:p-6 md:pt-16 md:pb-32">
            <div class="glass-panel w-full max-w-4xl rounded-2xl p-6 md:p-8 relative transition-all" onclick="event.stopPropagation()">
                
                <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-white transition-colors text-xl bg-slate-800 w-8 h-8 rounded-full flex items-center justify-center border border-slate-700"><i class="fa-solid fa-xmark"></i></button>
                
                <h2 id="modalTitle" class="font-heading text-2xl font-bold text-white mb-6 border-b border-slate-700 pb-4">Add New Project</h2>
                
                <form id="projectForm" class="space-y-6">
                    <input type="hidden" id="docId">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Project Title *</label>
                            <input type="text" id="projectTitle" required class="glass-input w-full rounded-lg px-4 py-2.5">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Live URL</label>
                            <input type="url" id="liveUrl" class="glass-input w-full rounded-lg px-4 py-2.5" placeholder="https://...">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Business Type *</label>
                            <input type="text" id="businessType" required class="glass-input w-full rounded-lg px-4 py-2.5">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Industry *</label>
                            <input type="text" id="industry" required class="glass-input w-full rounded-lg px-4 py-2.5">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Status *</label>
                            <select id="status" class="glass-input w-full rounded-lg px-4 py-2.5 appearance-none cursor-pointer">
                                <option value="Live">Live</option>
                                <option value="In Development">In Development</option>
                                <option value="Maintenance">Maintenance</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Live Date *</label>
                            <input type="date" id="liveDate" required class="glass-input w-full rounded-lg px-4 py-2.5 cursor-pointer">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Thumbnail Image URL *</label>
                            <input type="url" id="thumbnailUrl" required class="glass-input w-full rounded-lg px-4 py-2.5">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Short Description *</label>
                            <textarea id="shortDescription" required rows="2" class="glass-input w-full rounded-lg px-4 py-2.5 resize-none"></textarea>
                        </div>
                        <div class="md:col-span-2 border-t border-slate-700 pt-6">
                            <label class="block text-xs font-bold text-brand-400 uppercase tracking-widest mb-2">Technologies (Comma Separated) *</label>
                            <input type="text" id="technologies" required class="glass-input w-full rounded-lg px-4 py-2.5" placeholder="React, Spring Boot">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-bold text-brand-400 uppercase tracking-widest mb-2">Tags (Comma Separated)</label>
                            <input type="text" id="tags" class="glass-input w-full rounded-lg px-4 py-2.5" placeholder="dashboard, api">
                        </div>
                        <div class="md:col-span-2 border-t border-slate-700 pt-6 flex flex-col sm:flex-row gap-6 sm:gap-12">
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" id="isVisible" checked class="w-5 h-5 rounded border-slate-600 bg-slate-800 text-brand-500 focus:ring-brand-500 transition-all cursor-pointer">
                                <span class="text-sm font-bold text-white group-hover:text-brand-300">Publicly Visible</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group">
                                <input type="checkbox" id="isFeatured" class="w-5 h-5 rounded border-slate-600 bg-slate-800 text-amber-500 focus:ring-amber-500 transition-all cursor-pointer">
                                <span class="text-sm font-bold text-amber-400 group-hover:text-amber-300"><i class="fa-solid fa-star mr-1"></i> Featured Project</span>
                            </label>
                        </div>
                    </div>
                    <div class="pt-8 mt-4 border-t border-slate-700 flex justify-end gap-4 sticky bottom-0 bg-[rgba(30,41,59,0.9)] -mx-6 px-6 pb-2 md:-mx-8 md:px-8">
                        <button type="button" onclick="closeModal()" class="px-6 py-2.5 border border-slate-600 text-slate-300 font-bold rounded-lg hover:bg-slate-800 transition-colors">Cancel</button>
                        <button type="submit" id="saveBtn" class="px-8 py-2.5 bg-brand-600 text-white font-bold rounded-lg hover:bg-brand-500 transition-colors flex items-center gap-2 shadow-lg shadow-brand-500/20">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCDjYLJRXjCtxqIa7s1rsIKBp1s0-vgEss",
            authDomain: "zigzex-it.firebaseapp.com",
            projectId: "zigzex-it",
            storageBucket: "zigzex-it.firebasestorage.app",
            messagingSenderId: "900599050764",
            appId: "1:900599050764:web:8520e1f5ea557dfd48b429"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); 
        
        let localProjects = [];
        let filteredAdminProjects = [];
        
        const ADMIN_ITEMS_PER_PAGE = 12; 
        let adminVisibleCount = ADMIN_ITEMS_PER_PAGE;

        // === AUTHENTICATION LOGIC ===
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.body.classList.remove('justify-center'); 
                const dashboard = document.getElementById('dashboard-screen');
                dashboard.classList.remove('hidden');
                setTimeout(() => dashboard.classList.remove('opacity-0'), 50);
                fetchAdminProjects();
            } else {
                document.getElementById('dashboard-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.add('opacity-0');
                document.body.classList.add('justify-center');
                document.getElementById('login-screen').classList.remove('hidden');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorBox = document.getElementById('loginError');
            
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Authenticating...';
            errorBox.classList.add('hidden');

            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                errorBox.classList.remove('hidden');
                btn.innerHTML = '<i class="fa-solid fa-lock mr-2"></i> Authenticate';
            }
        });

        window.logoutAdmin = function() {
            signOut(auth).then(() => document.getElementById('loginForm').reset());
        }

        // === FETCH AND FILTER LOGIC ===
        async function fetchAdminProjects() {
            try {
                const querySnapshot = await getDocs(collection(db, "projects"));
                localProjects = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                updateQuickStats();
                populateAdminIndustryFilter();
                applyAdminFilters(); 
            } catch (error) {
                console.error("Error loading projects:", error);
                document.getElementById('admin-grid').innerHTML = '<div class="col-span-full text-red-400 text-center py-10 font-bold">Failed to connect to Firebase.</div>';
            }
        }

        function updateQuickStats() {
            document.getElementById('stat-total').innerText = localProjects.length;
            document.getElementById('stat-live').innerText = localProjects.filter(p => p.status === 'Live').length;
            document.getElementById('stat-hidden').innerText = localProjects.filter(p => p.isVisible === false).length;
        }

        function populateAdminIndustryFilter() {
            const indSelect = document.getElementById('adminIndustryFilter');
            indSelect.innerHTML = '<option value="All">All Industries</option>';
            const industries = [...new Set(localProjects.map(p => p.industry).filter(Boolean))];
            industries.forEach(ind => {
                const opt = document.createElement('option');
                opt.value = ind; opt.innerText = ind;
                indSelect.appendChild(opt);
            });
        }

        function applyAdminFilters() {
            const term = document.getElementById('adminSearch').value.toLowerCase();
            const ind = document.getElementById('adminIndustryFilter').value;
            const status = document.getElementById('adminStatusFilter').value;
            
            filteredAdminProjects = localProjects.filter(p => {
                const matchSearch = (p.projectTitle || '').toLowerCase().includes(term) || 
                                    (p.industry || '').toLowerCase().includes(term) ||
                                    (p.technologies || []).some(t => (t.technology || t).toLowerCase().includes(term));
                
                const matchInd = ind === 'All' || p.industry === ind;
                const matchStatus = status === 'All' || (p.status || '').includes(status);
                
                return matchSearch && matchInd && matchStatus;
            });
            
            filteredAdminProjects.sort((a, b) => new Date(b.liveDate || 0) - new Date(a.liveDate || 0));
            
            adminVisibleCount = ADMIN_ITEMS_PER_PAGE; 
            renderAdminGrid();
        }

        window.loadMoreAdminProjects = function() {
            adminVisibleCount += ADMIN_ITEMS_PER_PAGE;
            renderAdminGrid();
        }

        function renderAdminGrid() {
            const grid = document.getElementById('admin-grid');
            const loadBtn = document.getElementById('adminLoadMoreBtn');
            grid.innerHTML = '';
            
            if(filteredAdminProjects.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-500 font-bold border border-slate-700 border-dashed rounded-2xl">No projects match your search.</div>';
                loadBtn.style.display = 'none';
                return;
            }

            const projectsToRender = filteredAdminProjects.slice(0, adminVisibleCount);

            projectsToRender.forEach(p => {
                const isVis = p.isVisible !== false ? '<span class="text-emerald-400"><i class="fa-solid fa-eye"></i> Visible</span>' : '<span class="text-rose-400"><i class="fa-solid fa-eye-slash"></i> Hidden</span>';
                const isFeat = p.isFeatured ? '<span class="text-amber-400 ml-3"><i class="fa-solid fa-star"></i> Featured</span>' : '';
                
                const viewLiveBtn = p.liveUrl ? `<a href="${p.liveUrl}" target="_blank" class="w-10 bg-slate-700 hover:bg-brand-600 text-white flex items-center justify-center rounded-lg transition-colors"><i class="fa-solid fa-arrow-up-right-from-square text-xs"></i></a>` : '';

                // NEW: Added Clone button to card
                const card = `
                <div class="glass-panel rounded-2xl p-4 flex flex-col transition-transform hover:-translate-y-1">
                    <img src="${p.thumbnailUrl || ''}" class="w-full h-32 object-cover rounded-xl mb-4 bg-slate-800 border border-slate-700" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
                    
                    <div class="text-[10px] font-bold uppercase tracking-widest mb-1 flex justify-between">
                        <span class="text-brand-400 truncate pr-2">${p.industry || 'N/A'}</span>
                        <span class="shrink-0">${isVis} ${isFeat}</span>
                    </div>
                    
                    <h3 class="font-heading text-lg font-bold text-white mb-1 line-clamp-1">${p.projectTitle || 'Untitled'}</h3>
                    <p class="text-slate-400 text-xs mb-4 font-bold"><span class="${p.status === 'Live' ? 'text-emerald-400' : 'text-amber-400'} border border-current px-2 py-0.5 rounded text-[9px]">${p.status}</span></p>
                    
                    <div class="flex gap-2 mt-auto border-t border-slate-700 pt-4">
                        <button onclick="window.editProject('${p.id}')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white text-[10px] uppercase tracking-wider font-bold py-2.5 rounded-lg transition-colors"><i class="fa-solid fa-pen mr-1"></i> Edit</button>
                        <button onclick="window.duplicateProject('${p.id}')" class="flex-1 bg-brand-600/20 hover:bg-brand-600/40 text-brand-400 hover:text-white border border-brand-500/30 text-[10px] uppercase tracking-wider font-bold py-2.5 rounded-lg transition-all"><i class="fa-solid fa-copy mr-1"></i> Clone</button>
                        ${viewLiveBtn}
                        <button onclick="window.deleteProject('${p.id}')" class="w-10 bg-rose-500/20 hover:bg-rose-500/80 text-rose-400 hover:text-white flex items-center justify-center rounded-lg border border-rose-500/30 transition-all"><i class="fa-solid fa-trash text-xs"></i></button>
                    </div>
                </div>`;
                grid.insertAdjacentHTML('beforeend', card);
            });

            if (adminVisibleCount >= filteredAdminProjects.length) {
                loadBtn.style.display = 'none';
            } else {
                loadBtn.style.display = 'inline-flex';
            }
        }

        // Event Listeners for Filters
        document.getElementById('adminSearch').addEventListener('input', applyAdminFilters);
        document.getElementById('adminIndustryFilter').addEventListener('change', applyAdminFilters);
        document.getElementById('adminStatusFilter').addEventListener('change', applyAdminFilters);

        // === NEW FEATURE: EXPORT TO CSV ===
        window.exportToCSV = function() {
            if (localProjects.length === 0) {
                alert("No data to export.");
                return;
            }

            const headers = ['Project Title', 'Industry', 'Business Type', 'Status', 'Live Date', 'Visible', 'Featured', 'Live URL'];
            
            const rows = localProjects.map(p => [
                `"${p.projectTitle || ''}"`,
                `"${p.industry || ''}"`,
                `"${p.businessType || ''}"`,
                `"${p.status || ''}"`,
                `"${p.liveDate || ''}"`,
                p.isVisible !== false,
                p.isFeatured === true,
                `"${p.liveUrl || ''}"`
            ]);

            const csvContent = "data:text/csv;charset=utf-8," 
                + headers.join(",") + "\n" 
                + rows.map(e => e.join(",")).join("\n");

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `zigzex_portfolio_export_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // === NEW FEATURE: DUPLICATE PROJECT ===
        window.duplicateProject = async function(id) {
            const projectToClone = localProjects.find(p => p.id === id);
            if(!projectToClone) return;

            if(confirm(`Create a copy of "${projectToClone.projectTitle}"?`)) {
                try {
                    const clonedData = {
                        projectTitle: projectToClone.projectTitle + " (Copy)",
                        liveUrl: projectToClone.liveUrl || '',
                        businessType: projectToClone.businessType || '',
                        industry: projectToClone.industry || '',
                        status: 'In Development', // Safer defaults for clones
                        liveDate: new Date().toISOString().split('T')[0], 
                        thumbnailUrl: projectToClone.thumbnailUrl || '',
                        shortDescription: projectToClone.shortDescription || '',
                        technologies: projectToClone.technologies || [],
                        tags: projectToClone.tags || [],
                        isVisible: false, // Hide until admin reviews it
                        isFeatured: false
                    };

                    await addDoc(collection(db, "projects"), clonedData);
                    fetchAdminProjects(); 
                } catch (error) {
                    console.error("Clone Error: ", error);
                    alert("Failed to duplicate project.");
                }
            }
        }

        // === CRUD LOGIC ===
        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Saving...';
            btn.disabled = true;

            const techString = document.getElementById('technologies').value;
            const tagsString = document.getElementById('tags').value;
            const techArray = techString.split(',').map(s => s.trim()).filter(s => s !== '');
            const tagsArray = tagsString.split(',').map(s => s.trim()).filter(s => s !== '');

            const projectData = {
                projectTitle: document.getElementById('projectTitle').value,
                liveUrl: document.getElementById('liveUrl').value,
                businessType: document.getElementById('businessType').value,
                industry: document.getElementById('industry').value,
                status: document.getElementById('status').value,
                liveDate: document.getElementById('liveDate').value,
                thumbnailUrl: document.getElementById('thumbnailUrl').value,
                shortDescription: document.getElementById('shortDescription').value,
                technologies: techArray,
                tags: tagsArray,
                isVisible: document.getElementById('isVisible').checked,
                isFeatured: document.getElementById('isFeatured').checked
            };

            const docId = document.getElementById('docId').value;

            try {
                if(docId) {
                    await updateDoc(doc(db, "projects", docId), projectData);
                } else {
                    await addDoc(collection(db, "projects"), projectData);
                }
                window.closeModal();
                fetchAdminProjects();
            } catch (error) {
                console.error("Error saving: ", error);
                alert("Failed to save project.");
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Save';
                btn.disabled = false;
            }
        });

        window.editProject = function(id) {
            const project = localProjects.find(p => p.id === id);
            if(!project) return;
            document.getElementById('modalTitle').innerText = "Edit Project";
            document.getElementById('docId').value = project.id;
            
            document.getElementById('projectTitle').value = project.projectTitle || '';
            document.getElementById('liveUrl').value = project.liveUrl || '';
            document.getElementById('businessType').value = project.businessType || '';
            document.getElementById('industry').value = project.industry || '';
            document.getElementById('status').value = project.status || 'Live';
            document.getElementById('liveDate').value = project.liveDate || '';
            document.getElementById('thumbnailUrl').value = project.thumbnailUrl || '';
            document.getElementById('shortDescription').value = project.shortDescription || '';
            document.getElementById('technologies').value = project.technologies ? project.technologies.join(', ') : '';
            document.getElementById('tags').value = project.tags ? project.tags.join(', ') : '';
            document.getElementById('isVisible').checked = project.isVisible !== false;
            document.getElementById('isFeatured').checked = project.isFeatured === true;
            window.openModal();
        }

        window.deleteProject = async function(id) {
            if(confirm("DANGER: Permanently delete this project?")) {
                try {
                    await deleteDoc(doc(db, "projects", id));
                    fetchAdminProjects(); 
                } catch (error) {
                    console.error("Delete Error: ", error);
                }
            }
        }

        window.openModal = function() {
            document.getElementById('projectModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        }
        window.closeModal = function() {
            document.getElementById('projectModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
            document.getElementById('projectForm').reset();
            document.getElementById('docId').value = ''; 
            document.getElementById('modalTitle').innerText = "Add New Project";
        }
        document.getElementById('projectModal').addEventListener('click', function(e) {
            if (e.target === this) window.closeModal();
        });
    </script>
</body>
</html>
